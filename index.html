<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Sign In | Hotel Menu Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { display: flex; min-height: 100vh; background-color: #050505; color: #fff; overflow-x: hidden; }
        .hero-section { flex: 1.2; position: relative; background: url('https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=1920&q=80') center/cover; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(90deg, rgba(5,5,5,0.2) 0%, rgba(5,5,5,1) 100%); }
        .login-section { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 40px 8%; background: #050505; z-index: 10; border-left: 1px solid rgba(255,255,255,0.05); }
        .brand { font-family: 'Playfair Display', serif; font-size: 42px; color: #D4AF37; margin-bottom: 10px; letter-spacing: 1px; }
        .subtitle { color: #888; font-size: 15px; margin-bottom: 40px; font-weight: 300; }
        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; color: #D4AF37; margin-bottom: 8px; font-weight: 600; }
        input { width: 100%; padding: 18px 20px; background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 8px; color: #fff; font-size: 15px; outline: none; transition: 0.3s; }
        input:focus { border-color: #D4AF37; background: #111; box-shadow: 0 0 10px rgba(212,175,55,0.1); }
        button { width: 100%; padding: 18px; margin-top: 20px; border: none; border-radius: 8px; background: #D4AF37; color: #050505; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; letter-spacing: 0.5px; }
        button:hover { background: #b5952f; transform: translateY(-2px); }
        .security-badge { display: flex; align-items: center; justify-content: center; margin-top: 40px; color: #444; font-size: 12px; gap: 8px; text-transform: uppercase; letter-spacing: 1px; }
        #authLoader { position: fixed; inset: 0; background: #050505; z-index: 9999; display: none; justify-content: center; align-items: center; font-size: 20px; color: #D4AF37; font-family: 'Playfair Display', serif; letter-spacing: 2px; }
        @media(max-width: 900px){ 
            .hero-section { display: none; } 
            .login-section { flex: 1; padding: 40px 5%; } 
            .brand { font-size: 32px; }
        }
    </style>
    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        }
    </script>
</head>
<body>
    <div id="authLoader">VERIFYING SECURE ACCESS...</div>
    <div class="hero-section"><div class="hero-overlay"></div></div>
    <div class="login-section">
        <div class="brand">Hotel Menu Pro</div>
        <div class="subtitle">Secure Enterprise Access Management</div>
        <div class="input-group">
            <label>Authorized Email</label>
            <input type="email" id="username" placeholder="admin@enterprise.com" required>
        </div>
        <div class="input-group">
            <label>Security Key</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button id="loginBtn">AUTHENTICATE SYSTEM</button>
        <div class="security-badge">🔒 End-to-End Encrypted Secure Portal</div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
