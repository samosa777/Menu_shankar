<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deploy Entity | Hotel Menu Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #050505; color: #fff; padding: 40px 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #authLoader { position: fixed; inset: 0; background: #050505; z-index: 9999; display: flex; justify-content: center; align-items: center; font-size: 20px; color: #D4AF37; font-family: 'Playfair Display', serif; letter-spacing: 2px; }

        .form-container { width: 100%; max-width: 900px; background: #0a0a0a; border: 1px solid #1a1a1a; padding: 50px; border-radius: 8px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .header { margin-bottom: 40px; border-bottom: 1px solid #1a1a1a; padding-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .title { font-family: 'Playfair Display', serif; font-size: 32px; color: #D4AF37; font-weight: 600; }
        .back-btn { color: #888; text-decoration: none; font-size: 14px; font-weight: 500; transition: 0.3s; display: inline-flex; align-items: center; gap: 5px; }
        .back-btn:hover { color: #D4AF37; }

        .section-title { font-size: 12px; color: #D4AF37; text-transform: uppercase; letter-spacing: 2px; margin: 35px 0 20px; font-weight: 600; border-left: 3px solid #D4AF37; padding-left: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full { grid-column: 1 / 3; }

        input, select, textarea { width: 100%; padding: 16px; background: #111; border: 1px solid #222; border-radius: 6px; color: #fff; outline: none; font-size: 14px; transition: 0.3s; }
        input:focus, select:focus, textarea:focus { border-color: #D4AF37; background: #151515; }
        textarea { height: 100px; resize: none; }

        .submit-btn { width: 100%; padding: 18px; margin-top: 45px; background: #D4AF37; color: #000; border: none; border-radius: 6px; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.3s; letter-spacing: 1px; }
        .submit-btn:hover { background: #b5952f; transform: translateY(-2px); }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .full { grid-column: auto; }
            .form-container { padding: 25px 20px; }
            .title { font-size: 24px; }
        }
    </style>
</head>
<body>
<div id="authLoader">VERIFYING ADMIN DEPLOYMENT PRIVILEGES...</div>
<div class="form-container">
    <div class="header">
        <div class="title">Deploy Client Entity</div>
        <a href="dashboard.html" class="back-btn">← Command Center</a>
    </div>

    <div class="section-title">Core Operational Information</div>
    <div class="grid">
        <input type="text" id="hotelName" placeholder="Hotel Asset Name (e.g., Grand Palace Hospitality)" required>
        <input type="text" id="ownerName" placeholder="Principal Director Name" required>
        <input type="email" id="email" placeholder="System Authorization Email" required>
        <input type="password" id="password" placeholder="Initial Cryptographic Access Key" required>
    </div>

    <div class="section-title">Geographical Parameters & Communication</div>
    <div class="grid">
        <input type="text" id="mobile" placeholder="Primary Mobile Node" required>
        <input type="text" id="whatsapp" placeholder="Secure WhatsApp Node">
        <textarea id="address" class="full" placeholder="Complete Physical Geographical Address Architecture" required></textarea>
        <input type="text" id="city" placeholder="City Location Grid" required>
        <input type="text" id="state" placeholder="State/Province Jurisdiction" required>
        <input type="text" id="country" placeholder="Sovereign Country Location" required>
        <input type="text" id="maps" class="full" placeholder="Google Maps Satellite Engine Coordinates Link">
    </div>

    <div class="section-title">Digital Allocation & Subscription Metrics</div>
    <div class="grid">
        <input type="text" id="website" placeholder="Official Interface Domain URL">
        <input type="text" id="facebook" placeholder="Facebook Social Anchor Link">
        <input type="text" id="instagram" placeholder="Instagram Media Anchor Handle">
        <select id="plan">
            <option value="Elite Plan">Elite Subscription Architecture</option>
            <option value="Enterprise Plan">Enterprise Subscription Architecture</option>
        </select>
        <input type="date" id="startDate" required>
        <select id="status">
            <option value="Active">Operational Activation Status</option>
            <option value="Inactive">Suspended Status</option>
        </select>
    </div>

    <button class="submit-btn" id="createHotelBtn">INITIALIZE CLIENT ALLOCATION</button>
</div>
<script type="module" src="add-hotel.js"></script>
</body>
</html>
